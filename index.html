<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <h1>Student Registration Form</h1>
        <p>Fill in your details below to register.</p>

        <form>

            <div class="row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Enter first name" required>
                </div>

                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Enter last name" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="example@email.com" required>
                </div>

                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" pattern="[0-9]{10}" placeholder="10-digit mobile number" required>
                </div>
            </div>

            <div class="input-group">
                <label>Gender</label>

                <div class="radio-group">
                    <label><input type="radio" name="gender" required> Male</label>
                    <label><input type="radio" name="gender"> Female</label>
                    <label><input type="radio" name="gender"> Other</label>
                </div>
            </div>

            <div class="input-group">
                <label>Address</label>
                <textarea rows="4" placeholder="Enter your address"></textarea>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>City</label>
                    <input type="text" required>
                </div>

                <div class="input-group">
                    <label>State</label>
                    <input type="text" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Country</label>
                    <input type="text" required>
                </div>

                <div class="input-group">
                    <label>PIN Code</label>
                    <input type="text" pattern="[0-9]{6}" placeholder="6-digit PIN" required>
                </div>
            </div>

            <div class="input-group">
                <label>Hobbies</label>

                <div class="checkbox-group">
                    <label><input type="checkbox"> Reading</label>
                    <label><input type="checkbox"> Music</label>
                    <label><input type="checkbox"> Sports</label>
                    <label><input type="checkbox"> Coding</label>
                </div>
            </div>

            <div class="input-group">
                <label>Highest Qualification</label>

                <select required>
                    <option value="">Select Qualification</option>
                    <option>High School</option>
                    <option>Higher Secondary</option>
                    <option>Bachelor's Degree</option>
                    <option>Master's Degree</option>
                    <option>PhD</option>
                </select>
            </div>

            <div class="input-group">
                <label>Course Applied For</label>

                <select required>
                    <option value="">Select Course</option>
                    <option>BCA</option>
                    <option>B.Sc</option>
                    <option>B.Com</option>
                    <option>BA</option>
                    <option>MCA</option>
                    <option>M.Sc</option>
                    <option>M.Com</option>
                    <option>MA</option>
                </select>
            </div>

            <div class="buttons">
                <button type="submit">Submit</button>
                <button type="reset" class="reset">Reset</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
